services:
  postgres:
    image: postgres:17-alpine
    container_name: tableria-postgres
    environment:
      POSTGRES_USER: tableria
      POSTGRES_PASSWORD: tableria_dev
      POSTGRES_DB: tableria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableria"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: tableria-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
